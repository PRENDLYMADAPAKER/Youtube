    function resultCardHTML(r){return r.kind==='playlist'?playlistCardHTML(r):videoCardHTML(r.video)}function playlistCardHTML(r){const title=escapeHTML(r.snippet.title),channel=escapeHTML(r.snippet.channelTitle),channelId=r.snippet.channelId||'',thumb=r.snippet.thumbnails.high?.url||r.snippet.thumbnails.medium?.url||r.snippet.thumbnails.default?.url,avatar=avatarMarkup(channel,r.snippet.channelIcon||'');return`<article class="video-card" onclick="loadPlaylist('${r.playlistId}','${title}')"><div class="thumbnail"><img src="${thumb}" alt="${title}"/><div class="playlist-stack">▶</div><span class="playlist-badge">Playlist</span></div><div class="video-info"><div class="avatar" onclick="event.stopPropagation();openChannelVideos('${channel}','${channelId}')">${avatar}</div><div><h3 class="video-title">${title}</h3><p class="meta">${channel}</p><p class="meta">View full playlist</p></div><div class="dots">⋮</div></div><div class="summary-card"><span>◉ Real playlist queue</span><span>▶</span></div></article>`}function videoCardHTML(v){const id=v.id,title=escapeHTML(v.snippet.title),channel=escapeHTML(v.snippet.channelTitle),channelId=v.snippet.channelId||'',thumb=getVideoThumb(v),date=new Date(v.snippet.publishedAt).toLocaleDateString(),avatar=avatarMarkup(channel,v.snippet.channelIcon||''),views=compactViews(v.statistics?.viewCount);return`<article class="video-card" onclick="openSingleVideo('${id}','${title}','${channel}','${channelId}')"><div class="thumbnail"><img src="${thumb}" alt="${title}"/><span class="duration">${formatDuration(v.contentDetails?.duration)}</span></div><div class="video-info"><div class="avatar" onclick="event.stopPropagation();openChannelVideos('${channel}','${channelId}')">${avatar}</div><div><h3 class="video-title">${title}</h3><p class="meta">${channel}${views?' · '+views:''} · ${date}</p></div><div class="dots">⋮</div></div></article>`}function renderResults(results){if(!results.length){videoGrid.innerHTML='';emptyState.textContent='No playable videos or playlists found. Try another search.';emptyState.style.display='block';return}emptyState.style.display='none';videoGrid.innerHTML=results.map(resultCardHTML).join('')}function renderShorts(videos){const shorts=videos.length?videos:latestVideos.slice(0,4);shortsGrid.innerHTML=shorts.slice(0,4).map((v,i)=>`<article class="short-card" onclick="openSingleVideo('${v.id}','${escapeHTML(v.snippet.title)}','${escapeHTML(v.snippet.channelTitle)}','${v.snippet.channelId||''}')">${i%2===0?'<span class="new-badge">New</span>':''}<img src="${getVideoThumb(v)}" alt=""/><div class="short-title">${escapeHTML(v.snippet.title)}</div></article>`).join('')}
    async function loadPlaylist(pid,name){openPlayerShell();playlistTitle.textContent=name;playlistSub.textContent='Loading real YouTube playlist...';playlistCount.textContent='Loading';playlistQueue.innerHTML='<p class="meta" style="padding:16px 0">Loading playlist queue...</p>';const url=new URL('https://www.googleapis.com/youtube/v3/playlistItems');url.searchParams.set('part','snippet,contentDetails');url.searchParams.set('playlistId',pid);url.searchParams.set('maxResults','50');url.searchParams.set('key',API_KEY);const data=await youtubeFetch(url);currentPlaylist=await getVideoDetails((data.items||[]).map(x=>x.contentDetails?.videoId).filter(Boolean));currentPlaylistTitle=name;currentPlaylistIndex=0;latestVideos=currentPlaylist;if(!currentPlaylist.length){playlistSub.textContent='No playable videos found in this playlist.';playlistCount.textContent='0 videos';playlistQueue.innerHTML='';return}openPlayerFromPlaylist(0)}function openPlayerShell(){playerModal.style.display='block';document.body.style.overflow='hidden';window.scrollTo({top:0})}function loadYouTubeVideo(id){playerFrame.src=`https://www.youtube.com/embed/${id}?autoplay=1&rel=0&playsinline=1`}function rememberHistory(v){if(!v)return;const h=getSaved('nzmTubeHistory').filter(x=>x.id!==v.id);h.unshift(v);setSaved('nzmTubeHistory',h)}function openSingleVideo(id,title,channel,channelId){currentPlaylist=latestVideos.length?latestVideos:[];currentPlaylistTitle='Suggested videos';const idx=currentPlaylist.findIndex(v=>v.id===id);currentPlaylistIndex=idx>=0?idx:0;openPlayer(id,title,channel,channelId);renderQueue()}function openPlayerFromPlaylist(i){const v=currentPlaylist[i];if(!v)return;currentPlaylistIndex=i;openPlayer(v.id,v.snippet.title,v.snippet.channelTitle,v.snippet.channelId||'');renderQueue()}function openPlayer(id,title,channel,channelId){currentVideo={videoId:id,title,channel,channelId};const active=currentPlaylist.find(v=>v.id===id)||latestVideos.find(v=>v.id===id);rememberHistory(active);watchTitle.textContent=title;watchMeta.textContent=`${channel} · NZM TUBE`;loadYouTubeVideo(id);openPlayerShell()}function renderQueue(){playlistTitle.textContent=currentPlaylistTitle;playlistCount.textContent=`${currentPlaylist.length} videos`;playlistSub.textContent=currentPlaylistTitle==='Suggested videos'?'Suggested videos from your current search':'Real YouTube playlist queue';playlistQueue.innerHTML=currentPlaylist.map((v,i)=>`<div class="queue-video ${i===currentPlaylistIndex?'active':''}" onclick="openPlayerFromPlaylist(${i})"><div class="queue-grip">≡</div><img class="queue-thumb" src="${getVideoThumb(v)}"/><div><h3 class="queue-title">${escapeHTML(v.snippet.title)}</h3><p class="meta">${escapeHTML(v.snippet.channelTitle)}${v.statistics?.viewCount?' · '+compactViews(v.statistics.viewCount):''}</p></div><div class="dots">⋮</div></div>`).join('');suggestedGrid.innerHTML=currentPlaylist.filter((_,i)=>i!==currentPlaylistIndex).slice(0,10).map(videoCardHTML).join('')}
    function minimizeVideoPlayer(){if(!currentVideo)return closeVideoPlayer();const active=currentPlaylist.find(v=>v.id===currentVideo.videoId)||latestVideos.find(v=>v.id===currentVideo.videoId);minimizedVideo=currentVideo;miniThumb.src=getVideoThumb(active);miniTitle.textContent=currentVideo.title;miniMeta.textContent=currentVideo.channel;playerModal.style.display='none';miniPlayer.style.display='flex';fixMiniPlayerLayout();document.body.style.overflow='' }function restoreMiniPlayer(){if(!minimizedVideo)return;playerModal.style.display='block';miniPlayer.style.display='none';document.body.style.overflow='hidden'}function closeVideoPlayer(){playerFrame.src='';playerModal.style.display='none';miniPlayer.style.display='none';document.body.style.overflow=''}function playNextSuggested(){if(!currentPlaylist.length)return;const next=currentPlaylistIndex+1;if(next<currentPlaylist.length)openPlayerFromPlaylist(next);else if(loopPlaylist)openPlayerFromPlaylist(0)}function shufflePlaylist(){for(let i=currentPlaylist.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[currentPlaylist[i],currentPlaylist[j]]=[currentPlaylist[j],currentPlaylist[i]]}currentPlaylistIndex=0;renderQueue();if(currentPlaylist[0])openPlayerFromPlaylist(0)}async function openChannelVideos(channel,channelId){closeVideoPlayer();showLoading();try{latestVideos=await getPlayableVideos(channel,24,channelId);latestResults=latestVideos.map(video=>({kind:'video',video}));renderResults(latestResults.slice(0,12));renderShorts(latestVideos.slice(8,14));scrollTo({top:0,behavior:'smooth'})}catch(e){showError(e.message||'Could not load channel videos.')}}function renderHistory(){const h=getSaved('nzmTubeHistory');currentSearch='Watch History';latestVideos=h;latestResults=h.map(video=>({kind:'video',video}));if(!h.length){videoGrid.innerHTML='';shortsGrid.innerHTML='';emptyState.textContent='No watch history yet. Play a video first.';emptyState.style.display='block';return}emptyState.style.display='none';videoGrid.innerHTML='<h2 style="padding:18px 14px 12px;font-size:24px">Watch History</h2>'+h.map(videoCardHTML).join('');renderShorts(h.slice(0,4))}
    function getSuggestionItems(filter=''){const recent=getSaved('nzmTubeSearches');const all=[...new Set([...recent,...DEFAULT_SUGGESTIONS])].slice(0,50);const clean=filter.trim().toLowerCase();if(!clean)return all.slice(0,15);const starts=all.filter(x=>x.toLowerCase().startsWith(clean));const contains=all.filter(x=>!x.toLowerCase().startsWith(clean)&&x.toLowerCase().includes(clean));const smart=[`${filter} songs`,`${filter} playlist`,`${filter} karaoke`,`${filter} live`,`${filter} remix`];return[...new Set([...starts,...smart,...contains])].slice(0,14)}function renderSearchSuggestions(filter=''){const recent=getSaved('nzmTubeSearches');const items=getSuggestionItems(filter);searchSuggestionList.innerHTML=items.map(item=>{const isRecent=recent.some(r=>r.toLowerCase()===item.toLowerCase());const key=item.toLowerCase().split(' ')[0];const thumb=latestVideos.find(v=>(v.snippet.title+' '+v.snippet.channelTitle).toLowerCase().includes(key));const thumbUrl=thumb?getVideoThumb(thumb):'';return`<div class="suggestion-row" onclick="runOverlaySearch('${escapeHTML(item)}')"><div class="suggestion-icon">${isRecent?'↺':'⌕'}</div><div><div class="suggestion-text">${escapeHTML(item)}</div>${item.toLowerCase()==='michael pangilinan'?'<div class="suggestion-sub">Singer-songwriter and actor</div>':''}</div>${thumbUrl?`<img class="suggestion-thumb" src="${thumbUrl}"/>`:'<div></div>'}<div class="suggestion-arrow">↖</div></div>`}).join('')}function openSearchOverlay(){searchOverlay.style.display='block';overlaySearchInput.value='';renderSearchSuggestions('');setTimeout(()=>overlaySearchInput.focus(),50)}function closeSearchOverlay(){searchOverlay.style.display='none'}function runOverlaySearch(q){q=String(q||'').trim()||'trending videos';closeSearchOverlay();searchYouTube(q)}
    
    function fixMiniPlayerLayout(){
      if(!miniPlayer || miniPlayer.style.display !== 'flex') return;
      miniPlayer.style.left = '10px';
      miniPlayer.style.right = '10px';
      miniPlayer.style.width = '';
      miniPlayer.style.maxHeight = '74px';
      miniPlayer.style.overflow = 'hidden';
    }

    openSearchBtn.onclick=openSearchOverlay;closeSearchBtn.onclick=closeSearchOverlay;overlaySearchInput.oninput=()=>renderSearchSuggestions(overlaySearchInput.value);overlaySearchInput.onkeydown=e=>{if(e.key==='Enter')runOverlaySearch(overlaySearchInput.value);if(e.key==='Escape')closeSearchOverlay()};closePlayer.onclick=minimizeVideoPlayer;fullClose.onclick=closeVideoPlayer;miniOpen.onclick=restoreMiniPlayer;miniPlayNext.onclick=playNextSuggested;miniClose.onclick=closeVideoPlayer;playNextBtn.onclick=playNextSuggested;loopBtn.onclick=()=>{loopPlaylist=!loopPlaylist;loopBtn.style.color=loopPlaylist?'#ff0033':'#fff'};shuffleBtn.onclick=shufflePlaylist;channelBtn.onclick=()=>currentVideo&&openChannelVideos(currentVideo.channel,currentVideo.channelId);historyNav.onclick=()=>{renderHistory();scrollTo({top:0,behavior:'smooth'})};minimizeQueueBtn.onclick=()=>{playlistPanel.classList.toggle('minimized');minimizeQueueBtn.textContent=playlistPanel.classList.contains('minimized')?'⌃ Show queue':'⌄ Minimize'};window.addEventListener('scroll',()=>{if(innerHeight+scrollY>=document.body.offsetHeight-700)loadMoreResults()});chips.forEach(chip=>chip.onclick=()=>{chips.forEach(c=>c.classList.remove('active'));chip.classList.add('active');searchYouTube(chip.dataset.filter)});bottomItems.forEach(item=>item.onclick=()=>{searchYouTube(item.dataset.search);scrollTo({top:0,behavior:'smooth'})});searchYouTube();
  </script>

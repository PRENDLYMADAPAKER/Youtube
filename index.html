<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NZM TUBE</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; }
    body { background: #0f0f0f; color: #fff; padding-bottom: 76px; }
    button { font: inherit; }
    .topbar { position: sticky; top: 0; z-index: 50; background: #0f0f0f; padding: 14px 16px 8px; border-bottom: 1px solid #1f1f1f; }
    .top-row { display: flex; align-items: center; justify-content: space-between; gap: 14px; margin-bottom: 14px; }
    .brand { display: flex; align-items: center; gap: 8px; font-size: 28px; font-weight: 900; letter-spacing: -1px; }
    .logo { width: 44px; height: 30px; border-radius: 9px; background: #ff0033; display: grid; place-items: center; font-size: 15px; }
    .top-icons { display: flex; align-items: center; gap: 16px; font-size: 25px; }
    .notify { position: relative; }
    .notify::after { content: "9+"; position: absolute; right: -9px; top: -8px; background: #ff0033; color: #fff; font-size: 11px; padding: 2px 5px; border-radius: 999px; }
    .search-wrap { display: flex; border: 1px solid #303030; border-radius: 999px; overflow: hidden; background: #121212; margin-bottom: 14px; }
    .search-wrap input { flex: 1; border: none; outline: none; padding: 12px 16px; background: transparent; color: #fff; font-size: 16px; }
    .search-wrap button { width: 62px; border: none; border-left: 1px solid #303030; background: #222; color: #fff; cursor: pointer; font-size: 20px; }
    .chips { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; }
    .chips::-webkit-scrollbar { display: none; }
    .chip { border: none; border-radius: 12px; padding: 12px 18px; background: #272727; color: #fff; cursor: pointer; white-space: nowrap; font-size: 16px; }
    .chip.active { background: #fff; color: #111; }
    .compass { min-width: 54px; font-size: 22px; }
    main { max-width: 820px; margin: 0 auto; }
    .feed { padding: 0 0 18px; }
    .video-card { cursor: pointer; margin-bottom: 24px; }
    .thumbnail { position: relative; aspect-ratio: 16 / 9; overflow: hidden; background: #222; }
    .thumbnail img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .duration, .playlist-badge { position: absolute; right: 8px; bottom: 8px; padding: 5px 8px; border-radius: 6px; background: rgba(0,0,0,.78); color: #fff; font-size: 13px; }
    .playlist-stack { position: absolute; inset: 0 0 0 auto; width: 38%; background: rgba(0,0,0,.62); display: grid; place-items: center; font-size: 40px; }
    .video-info { display: grid; grid-template-columns: 46px 1fr 28px; gap: 12px; padding: 10px 14px 0; }
    .avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #333, #555); display: grid; place-items: center; font-weight: 800; font-size: 13px; }
    .video-title { font-size: 18px; line-height: 1.35; margin-bottom: 5px; font-weight: 650; }
    .meta { color: #aaa; font-size: 14px; line-height: 1.45; }
    .dots { font-size: 26px; line-height: 1; color: #ddd; }
    .channel-link:hover { color: #fff; text-decoration: underline; }
    .summary-card { margin: 12px 22px 0; padding: 12px 16px; border-radius: 12px; background: #063d12; color: #fff; display: flex; justify-content: space-between; align-items: center; font-weight: 700; }
    .shorts-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 22px; font-size: 26px; font-weight: 900; }
    .shorts-logo { color: #ff0033; margin-right: 10px; }
    .shorts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; padding: 0 14px 24px; }
    .short-card { position: relative; min-height: 280px; border-radius: 14px; overflow: hidden; background: #222; cursor: pointer; }
    .short-card img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
    .short-card::after { content: ""; position: absolute; inset: 0; background: linear-gradient(transparent 45%, rgba(0,0,0,.72)); }
    .short-title { position: absolute; z-index: 1; left: 10px; right: 10px; bottom: 12px; font-weight: 700; line-height: 1.25; }
    .new-badge { position: absolute; z-index: 2; top: 10px; left: 10px; background: #fff; color: #111; padding: 5px 9px; border-radius: 7px; font-weight: 700; }
    .empty { display: none; color: #aaa; padding: 32px 0; text-align: center; }
    .load-more-note { color: #aaa; text-align: center; padding: 22px; font-size: 14px; }
    .bottom-nav { position: fixed; left: 0; right: 0; bottom: 0; z-index: 60; height: 72px; background: #0f0f0f; border-top: 1px solid #272727; display: grid; grid-template-columns: repeat(3, 1fr); align-items: center; }
    .bottom-item { text-align: center; color: #eee; font-size: 12px; cursor: pointer; }
    .bottom-icon { display: block; font-size: 27px; margin-bottom: 3px; }
    .plus { width: 52px; height: 52px; border-radius: 50%; background: #272727; margin: 0 auto 2px; display: grid; place-items: center; font-size: 34px; }
    .player-modal { position: fixed; inset: 0; z-index: 999; display: none; background: #0f0f0f; overflow-y: auto; }
    .watch-player { position: sticky; top: 0; z-index: 2; background: #000; }
    .player-frame { width: 100%; aspect-ratio: 16 / 9; border: 0; display: block; background: #000; }
    .player-toolbar { position: absolute; top: 10px; left: 12px; right: 12px; display: flex; justify-content: space-between; pointer-events: none; }
    .close-player { pointer-events: auto; width: 38px; height: 38px; border: none; border-radius: 50%; background: rgba(0,0,0,.45); color: #fff; font-size: 26px; cursor: pointer; }
    .watch-details { padding: 14px 16px; border-bottom: 1px solid #272727; }
    .watch-title { font-size: 20px; line-height: 1.35; margin-bottom: 8px; }
    .watch-actions { display: flex; gap: 12px; overflow-x: auto; padding-top: 12px; }
    .action-btn { border: none; border-radius: 999px; padding: 10px 15px; background: #272727; color: #fff; white-space: nowrap; cursor: pointer; }
    .playlist-panel { padding: 14px 16px; border-bottom: 1px solid #272727; background: #151515; }
    .playlist-panel.minimized #playlistQueue, .playlist-panel.minimized .queue-controls, .playlist-panel.minimized .playlist-sub { display: none; }
    .playlist-panel.minimized { padding-bottom: 10px; }
    .playlist-title-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 4px; }
    .playlist-title { font-size: 18px; }
    .playlist-sub { color: #aaa; font-size: 14px; margin-bottom: 12px; }
    .queue-controls { display: flex; gap: 10px; margin-bottom: 12px; }
    .queue-btn { border: none; background: transparent; color: #fff; font-size: 24px; cursor: pointer; }
    .queue-video { display: grid; grid-template-columns: 8px 125px 1fr 24px; gap: 10px; padding: 10px 0; border-top: 1px solid #242424; cursor: pointer; align-items: center; }
    .queue-video.active { background: #21152d; margin-left: -16px; margin-right: -16px; padding-left: 16px; padding-right: 16px; }
    .queue-grip { color: #aaa; font-size: 22px; }
    .queue-thumb { width: 125px; aspect-ratio: 16 / 9; border-radius: 8px; object-fit: cover; background: #222; }
    .queue-title { font-size: 15px; line-height: 1.25; margin-bottom: 4px; }
    .suggested-grid { display: grid; gap: 0; }
    .suggested-grid .video-card { margin-bottom: 18px; }

    .skeleton-card { margin-bottom: 24px; padding-bottom: 12px; }
    .skeleton-thumb { aspect-ratio: 16 / 9; background: linear-gradient(90deg,#202020,#303030,#202020); background-size: 200% 100%; animation: shimmer 1.2s infinite; }
    .skeleton-line { height: 14px; margin: 10px 14px; border-radius: 99px; background: linear-gradient(90deg,#202020,#303030,#202020); background-size: 200% 100%; animation: shimmer 1.2s infinite; }
    .skeleton-line.short { width: 55%; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .mini-player { position: fixed; left: 10px; right: 10px; bottom: 82px; z-index: 80; display: none; align-items: center; gap: 10px; background: #181818; border: 1px solid #333; border-radius: 14px; padding: 8px; box-shadow: 0 12px 40px rgba(0,0,0,.55); }
    .mini-player img { width: 96px; aspect-ratio: 16/9; object-fit: cover; border-radius: 9px; background: #222; }
    .mini-info { min-width: 0; flex: 1; }
    .mini-title { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mini-meta { color: #aaa; font-size: 12px; margin-top: 3px; }
    .mini-btn { border: none; background: #272727; color: #fff; width: 34px; height: 34px; border-radius: 50%; cursor: pointer; }
    @media (min-width: 821px) { body { padding-bottom: 0; } .bottom-nav { display: none; } .topbar { padding-left: 24px; padding-right: 24px; } .thumbnail { border-radius: 0; } .shorts-grid { grid-template-columns: repeat(4, 1fr); } }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="top-row">
      <div class="brand"><div class="logo">▶</div><span>NZM TUBE</span></div>
      <div class="top-icons"></div>
    </div>
    <form class="search-wrap" id="searchForm">
      <input id="searchInput" type="search" placeholder="Search NZM TUBE" autocomplete="off" />
      <button type="submit">⌕</button>
    </form>
    <section class="chips">
      <button class="chip compass" data-filter="trending videos">◉</button>
      <button class="chip active" data-filter="trending videos">All</button>
      <button class="chip" data-filter="music playlist">Music</button>
      <button class="chip" data-filter="youtube music mix playlist">Mixes</button>
      <button class="chip" data-filter="Justin Bieber songs playlist">Justin Bieber</button>
      <button class="chip" data-filter="Philippines news">Philippines</button>
      <button class="chip" data-filter="gaming videos">Gaming</button>
      <button class="chip" data-filter="technology videos">Tech</button>
    </section>
  </header>

  <div class="player-modal" id="playerModal">
    <div class="watch-player">
      <iframe class="player-frame" id="playerFrame" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
      <div class="player-toolbar"><button class="close-player" id="closePlayer">⌄</button><button class="close-player" id="fullClose">×</button></div>
    </div>
    <div class="watch-details">
      <h1 class="watch-title" id="watchTitle">Now Playing</h1>
      <p class="meta" id="watchMeta">NZM TUBE</p>
      <div class="watch-actions">
        <button class="action-btn" id="channelBtn">Channel</button>
        <button class="action-btn" id="playNextBtn">▶ Play next</button>
      </div>
    </div>
    <div class="playlist-panel" id="playlistPanel">
      <div class="playlist-title-row">
        <h2 class="playlist-title" id="playlistTitle">Queue</h2>
        <button class="action-btn" id="minimizeQueueBtn" style="padding:7px 12px;">⌄ Minimize</button>
        <span class="meta" id="playlistCount">0 videos</span>
      </div>
      <p class="playlist-sub" id="playlistSub">Real playlist queue loads here when you open a playlist.</p>
      <div class="queue-controls"><button class="queue-btn" id="loopBtn">↻</button><button class="queue-btn" id="shuffleBtn">⇄</button></div>
      <div id="playlistQueue"></div>
    </div>
    <div class="suggested-grid" id="suggestedGrid"></div>
  </div>

  <div class="mini-player" id="miniPlayer">
    <img id="miniThumb" alt="Mini player thumbnail" />
    <div class="mini-info" id="miniOpen">
      <div class="mini-title" id="miniTitle">Now playing</div>
      <div class="mini-meta" id="miniMeta">NZM TUBE</div>
    </div>
    <button class="mini-btn" id="miniPlayNext">▶</button>
    <button class="mini-btn" id="miniClose">×</button>
  </div>


  <main>
    <section class="feed" id="videoGrid"></section>
    <p class="empty" id="emptyState">No videos found. Try another search.</p>
    <section id="shortsSection">
      <div class="shorts-header"><span><span class="shorts-logo">▶</span>Shorts</span><span class="dots">⋮</span></div>
      <div class="shorts-grid" id="shortsGrid"></div>
    </section>
  </main>

  <nav class="bottom-nav">
    <div class="bottom-item" data-search="trending videos"><span class="bottom-icon">⌂</span>Home</div>
    <div class="bottom-item" data-search="shorts viral videos"><span class="bottom-icon">▶</span>Shorts</div>
    <div class="bottom-item"><span class="plus">＋</span></div>
  </nav>

  <script>
    // Replace this placeholder with your restricted YouTube Data API v3 key.
    const API_KEY = "AIzaSyDZ_1Vx2llR5p-NWgvMTUEXKeZlPmKoU7A";

    const videoGrid = document.getElementById("videoGrid");
    const shortsGrid = document.getElementById("shortsGrid");
    const emptyState = document.getElementById("emptyState");
    const searchForm = document.getElementById("searchForm");
    const searchInput = document.getElementById("searchInput");
    const chips = document.querySelectorAll(".chip");
    const bottomItems = document.querySelectorAll(".bottom-item[data-search]");
    const playerModal = document.getElementById("playerModal");
    const playerFrame = document.getElementById("playerFrame");
    const closePlayer = document.getElementById("closePlayer");
    const fullClose = document.getElementById("fullClose");
    const miniPlayer = document.getElementById("miniPlayer");
    const miniThumb = document.getElementById("miniThumb");
    const miniTitle = document.getElementById("miniTitle");
    const miniMeta = document.getElementById("miniMeta");
    const miniOpen = document.getElementById("miniOpen");
    const miniPlayNext = document.getElementById("miniPlayNext");
    const miniClose = document.getElementById("miniClose");
    const watchTitle = document.getElementById("watchTitle");
    const watchMeta = document.getElementById("watchMeta");
    const suggestedGrid = document.getElementById("suggestedGrid");
    const playNextBtn = document.getElementById("playNextBtn");
    const channelBtn = document.getElementById("channelBtn");
    const playlistTitle = document.getElementById("playlistTitle");
    const playlistSub = document.getElementById("playlistSub");
    const playlistCount = document.getElementById("playlistCount");
    const playlistQueue = document.getElementById("playlistQueue");
    const playlistPanel = document.getElementById("playlistPanel");
    const minimizeQueueBtn = document.getElementById("minimizeQueueBtn");
    const loopBtn = document.getElementById("loopBtn");
    const shuffleBtn = document.getElementById("shuffleBtn");

    let latestVideos = [];
    let latestResults = [];
    let currentVideo = null;
    let currentSearch = "trending videos";
    let currentPlaylist = [];
    let currentPlaylistTitle = "Queue";
    let currentPlaylistIndex = 0;
    let loopPlaylist = false;
    let nextPageToken = "";
    let isLoadingMore = false;
    let minimizedVideo = null;

    function escapeHTML(text = "") {
      return String(text).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");
    }

    function showLoading() {
      videoGrid.innerHTML = Array.from({ length: 6 }).map(() => `
        <div class="skeleton-card">
          <div class="skeleton-thumb"></div>
          <div class="skeleton-line"></div>
          <div class="skeleton-line short"></div>
        </div>
      `).join("");
      emptyState.style.display = "none";
    }

    function showError(message) {
      videoGrid.innerHTML = "";
      emptyState.textContent = message;
      emptyState.style.display = "block";
    }

    async function youtubeFetch(url) {
      const response = await fetch(url);
      const data = await response.json();
      if (!response.ok) throw new Error(data.error?.message || "YouTube API request failed.");
      return data;
    }

    async function getVideoDetails(ids) {
      if (!ids.length) return [];
      const detailsUrl = new URL("https://www.googleapis.com/youtube/v3/videos");
      detailsUrl.searchParams.set("part", "snippet,statistics,status,contentDetails");
      detailsUrl.searchParams.set("id", ids.join(","));
      detailsUrl.searchParams.set("key", API_KEY);
      const data = await youtubeFetch(detailsUrl);
      return (data.items || []).filter(v => v.status?.embeddable === true);
    }

    async function getSearchResults(query, max = 24, pageToken = "") {
      const searchUrl = new URL("https://www.googleapis.com/youtube/v3/search");
      searchUrl.searchParams.set("part", "snippet");
      searchUrl.searchParams.set("type", "video,playlist");
      searchUrl.searchParams.set("maxResults", String(max));
      searchUrl.searchParams.set("q", query);
      searchUrl.searchParams.set("key", API_KEY);
      if (pageToken) searchUrl.searchParams.set("pageToken", pageToken);

      const searchData = await youtubeFetch(searchUrl);
      nextPageToken = searchData.nextPageToken || "";

      const videoIds = (searchData.items || []).filter(v => v.id?.kind === "youtube#video").map(v => v.id.videoId);
      const playableVideos = await getVideoDetails(videoIds);
      const videoMap = new Map(playableVideos.map(v => [v.id, v]));

      return (searchData.items || []).map(item => {
        if (item.id?.kind === "youtube#playlist") return { kind: "playlist", playlistId: item.id.playlistId, snippet: item.snippet };
        const detailed = videoMap.get(item.id?.videoId);
        return detailed ? { kind: "video", video: detailed } : null;
      }).filter(Boolean);
    }

    async function getPlayableVideos(query, max = 24, channelId = "") {
      const searchUrl = new URL("https://www.googleapis.com/youtube/v3/search");
      searchUrl.searchParams.set("part", "snippet");
      searchUrl.searchParams.set("type", "video");
      searchUrl.searchParams.set("videoEmbeddable", "true");
      searchUrl.searchParams.set("maxResults", String(max));
      searchUrl.searchParams.set("key", API_KEY);
      if (channelId) searchUrl.searchParams.set("channelId", channelId);
      else searchUrl.searchParams.set("q", query);
      const searchData = await youtubeFetch(searchUrl);
      const ids = (searchData.items || []).map(v => v.id?.videoId).filter(Boolean);
      return getVideoDetails(ids);
    }

    async function loadPlaylist(playlistId, playlistName) {
      openPlayerShell();
      playlistTitle.textContent = playlistName;
      playlistSub.textContent = "Loading real YouTube playlist...";
      playlistCount.textContent = "Loading";
      playlistQueue.innerHTML = `<p class="meta" style="padding:16px 0;">Loading playlist queue...</p>`;

      const url = new URL("https://www.googleapis.com/youtube/v3/playlistItems");
      url.searchParams.set("part", "snippet,contentDetails");
      url.searchParams.set("playlistId", playlistId);
      url.searchParams.set("maxResults", "50");
      url.searchParams.set("key", API_KEY);

      const data = await youtubeFetch(url);
      const ids = (data.items || []).map(item => item.contentDetails?.videoId).filter(Boolean);
      currentPlaylist = await getVideoDetails(ids);
      currentPlaylistTitle = playlistName;
      currentPlaylistIndex = 0;
      latestVideos = currentPlaylist;

      if (!currentPlaylist.length) {
        playlistSub.textContent = "No playable videos found in this playlist.";
        playlistCount.textContent = "0 videos";
        playlistQueue.innerHTML = "";
        return;
      }
      openPlayerFromPlaylist(0);
    }

    async function searchYouTube(query = currentSearch) {
      currentSearch = query;
      nextPageToken = "";
      if (!API_KEY || API_KEY === "YOUR_YOUTUBE_API_KEY_HERE") {
        showError("Add your YouTube API key inside the script first.");
        return;
      }
      showLoading();
      try {
        latestResults = await getSearchResults(query, 24);
        latestVideos = latestResults.filter(r => r.kind === "video").map(r => r.video);
        renderResults(latestResults.slice(0, 14));
        renderShorts(latestVideos.slice(8, 14));
      } catch (error) {
        showError(error.message || "Something went wrong while loading videos.");
      }
    }

    async function loadMoreResults() {
      if (!nextPageToken || isLoadingMore || playerModal.style.display === "block") return;
      isLoadingMore = true;
      const note = document.createElement("div");
      note.className = "load-more-note";
      note.textContent = "Loading more...";
      videoGrid.appendChild(note);
      try {
        const moreResults = await getSearchResults(currentSearch, 24, nextPageToken);
        latestResults = [...latestResults, ...moreResults];
        latestVideos = latestResults.filter(r => r.kind === "video").map(r => r.video);
        note.remove();
        videoGrid.insertAdjacentHTML("beforeend", moreResults.map(resultCardHTML).join(""));
      } catch (error) {
        note.textContent = error.message || "Could not load more videos.";
      } finally {
        isLoadingMore = false;
      }
    }

    function compactViews(num) {
      if (!num) return "";
      const n = Number(num);
      if (n >= 1000000) return `${(n / 1000000).toFixed(1)}M views`;
      if (n >= 1000) return `${Math.round(n / 1000)}K views`;
      return `${n} views`;
    }
function formatDuration(iso = "") {
      const match = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
      if (!match) return "Play";
      const h = Number(match[1] || 0);
      const m = Number(match[2] || 0);
      const sec = Number(match[3] || 0);
      if (h) return `${h}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
      return `${m}:${String(sec).padStart(2,"0")}`;
    }

    function getVideoThumb(video) {
      return video?.snippet?.thumbnails?.high?.url || video?.snippet?.thumbnails?.medium?.url || video?.snippet?.thumbnails?.default?.url || "";
    }

    function getSaved(key) {
      try { return JSON.parse(localStorage.getItem(key) || "[]"); } catch { return []; }
    }

    function setSaved(key, value) {
      localStorage.setItem(key, JSON.stringify(value.slice(0, 50)));
    }

    function rememberHistory(video) {
      if (!video) return;
      const history = getSaved("nzmTubeHistory").filter(v => v.id !== video.id);
      history.unshift(video);
      setSaved("nzmTubeHistory", history);
    }

    function loadYouTubeVideo(videoId) {
      // Use a plain YouTube embed. This is more reliable on mobile browsers than the IFrame API.
      playerFrame.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&playsinline=1`;
    }


    function resultCardHTML(result) {
      if (result.kind === "playlist") return playlistCardHTML(result);
      return videoCardHTML(result.video);
    }

    function playlistCardHTML(result) {
      const title = escapeHTML(result.snippet.title);
      const channel = escapeHTML(result.snippet.channelTitle);
      const channelId = result.snippet.channelId || "";
      const playlistId = result.playlistId;
      const thumb = result.snippet.thumbnails.high?.url || result.snippet.thumbnails.medium?.url || result.snippet.thumbnails.default?.url;
      const avatar = channel.slice(0, 2).toUpperCase();
      return `
        <article class="video-card" onclick="loadPlaylist('${playlistId}', '${title}')">
          <div class="thumbnail">
            <img src="${thumb}" alt="${title}" />
            <div class="playlist-stack">▶</div>
            <span class="playlist-badge">Playlist</span>
          </div>
          <div class="video-info">
            <div class="avatar channel-link" onclick="event.stopPropagation(); openChannelVideos('${channel}', '${channelId}')">${avatar}</div>
            <div>
              <h3 class="video-title">${title}</h3>
              <p class="meta channel-link" onclick="event.stopPropagation(); openChannelVideos('${channel}', '${channelId}')">${channel}</p>
              <p class="meta">View full playlist</p>
            </div>
            <div class="dots">⋮</div>
          </div>
          <div class="summary-card"><span>◉ Real playlist queue</span><span>▶</span></div>
        </article>`;
    }

    function videoCardHTML(video) {
      const videoId = video.id;
      const title = escapeHTML(video.snippet.title);
      const channel = escapeHTML(video.snippet.channelTitle);
      const channelId = video.snippet.channelId || "";
      const thumb = video.snippet.thumbnails.high?.url || video.snippet.thumbnails.medium?.url || video.snippet.thumbnails.default?.url;
      const date = new Date(video.snippet.publishedAt).toLocaleDateString();
      const avatar = channel.slice(0, 2).toUpperCase();
      const views = compactViews(video.statistics?.viewCount);
      return `
        <article class="video-card" onclick="openSingleVideo('${videoId}', '${title}', '${channel}', '${channelId}')">
          <div class="thumbnail">
            <img src="${thumb}" alt="${title}" />
            <span class="duration">${formatDuration(video.contentDetails?.duration)}</span>
          </div>
          <div class="video-info">
            <div class="avatar channel-link" onclick="event.stopPropagation(); openChannelVideos('${channel}', '${channelId}')">${avatar}</div>
            <div>
              <h3 class="video-title">${title}</h3>
              <p class="meta channel-link" onclick="event.stopPropagation(); openChannelVideos('${channel}', '${channelId}')">${channel}${views ? " · " + views : ""} · ${date}</p>
            </div>
            <div class="dots">⋮</div>
          </div>
        </article>`;
    }

    function renderResults(results) {
      if (!results.length) {
        videoGrid.innerHTML = "";
        emptyState.textContent = "No playable videos or playlists found. Try another search.";
        emptyState.style.display = "block";
        return;
      }
      emptyState.style.display = "none";
      videoGrid.innerHTML = results.map(resultCardHTML).join("");
    }

    function renderShorts(videos) {
      const shorts = videos.length ? videos : latestVideos.slice(0, 4);
      shortsGrid.innerHTML = shorts.slice(0, 4).map((video, index) => {
        const title = escapeHTML(video.snippet.title);
        const thumb = video.snippet.thumbnails.high?.url || video.snippet.thumbnails.medium?.url || video.snippet.thumbnails.default?.url;
        return `<article class="short-card" onclick="openSingleVideo('${video.id}', '${title}', '${escapeHTML(video.snippet.channelTitle)}', '${video.snippet.channelId || ""}')">
          ${index % 2 === 0 ? `<span class="new-badge">New</span>` : ""}
          <img src="${thumb}" alt="${title}" />
          <div class="short-title">${title}</div>
        </article>`;
      }).join("");
    }

    function openPlayerShell() {
      playerModal.style.display = "block";
      document.body.style.overflow = "hidden";
      window.scrollTo({ top: 0 });
    }

    function openSingleVideo(videoId, title, channel, channelId) {
      currentPlaylist = latestVideos.length ? latestVideos : [];
      currentPlaylistTitle = "Suggested videos";
      const index = currentPlaylist.findIndex(v => v.id === videoId);
      currentPlaylistIndex = index >= 0 ? index : 0;
      openPlayer(videoId, title, channel, channelId);
      renderQueue();
    }

    function openPlayerFromPlaylist(index) {
      const video = currentPlaylist[index];
      if (!video) return;
      currentPlaylistIndex = index;
      openPlayer(video.id, video.snippet.title, video.snippet.channelTitle, video.snippet.channelId || "");
      renderQueue();
    }

    function openPlayer(videoId, title, channel, channelId) {
      currentVideo = { videoId, title, channel, channelId };
      const activeVideo = currentPlaylist.find(v => v.id === videoId) || latestVideos.find(v => v.id === videoId);
      if (activeVideo) rememberHistory(activeVideo);
      watchTitle.textContent = title;
      watchMeta.textContent = `${channel} · NZM TUBE`;
      loadYouTubeVideo(videoId);
      openPlayerShell();
    }

    function renderQueue() {
      playlistTitle.textContent = currentPlaylistTitle;
      playlistCount.textContent = `${currentPlaylist.length} videos`;
      playlistSub.textContent = currentPlaylistTitle === "Suggested videos" ? "Suggested videos from your current search" : "Real YouTube playlist queue";

      playlistQueue.innerHTML = currentPlaylist.map((video, index) => {
        const title = escapeHTML(video.snippet.title);
        const channel = escapeHTML(video.snippet.channelTitle);
        const thumb = video.snippet.thumbnails.medium?.url || video.snippet.thumbnails.default?.url;
        const views = compactViews(video.statistics?.viewCount);
        return `
          <div class="queue-video ${index === currentPlaylistIndex ? "active" : ""}" onclick="openPlayerFromPlaylist(${index})">
            <div class="queue-grip">≡</div>
            <img class="queue-thumb" src="${thumb}" alt="${title}" />
            <div>
              <h3 class="queue-title">${title}</h3>
              <p class="meta">${channel}${views ? " · " + views : ""}</p>
            </div>
            <div class="dots">⋮</div>
          </div>`;
      }).join("");

      suggestedGrid.innerHTML = currentPlaylist
        .filter((_, index) => index !== currentPlaylistIndex)
        .slice(0, 10)
        .map(videoCardHTML)
        .join("");
    }

    function minimizeVideoPlayer() {
      if (!currentVideo) return closeVideoPlayer();
      const activeVideo = currentPlaylist.find(v => v.id === currentVideo.videoId) || latestVideos.find(v => v.id === currentVideo.videoId);
      minimizedVideo = currentVideo;
      miniThumb.src = getVideoThumb(activeVideo);
      miniTitle.textContent = currentVideo.title;
      miniMeta.textContent = currentVideo.channel;
      playerModal.style.display = "none";
      miniPlayer.style.display = "flex";
      document.body.style.overflow = "";
    }

    function restoreMiniPlayer() {
      if (!minimizedVideo) return;
      playerModal.style.display = "block";
      miniPlayer.style.display = "none";
      document.body.style.overflow = "hidden";
    }

    function closeVideoPlayer() {
      playerFrame.src = "";
      playerModal.style.display = "none";
      miniPlayer.style.display = "none";
      document.body.style.overflow = "";
    }

    function playNextSuggested() {
      if (!currentPlaylist.length) return;
      const nextIndex = currentPlaylistIndex + 1;
      if (nextIndex < currentPlaylist.length) openPlayerFromPlaylist(nextIndex);
      else if (loopPlaylist) openPlayerFromPlaylist(0);
    }

    function shufflePlaylist() {
      for (let i = currentPlaylist.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [currentPlaylist[i], currentPlaylist[j]] = [currentPlaylist[j], currentPlaylist[i]];
      }
      currentPlaylistIndex = 0;
      renderQueue();
      if (currentPlaylist[0]) openPlayerFromPlaylist(0);
    }

    async function openChannelVideos(channel, channelId) {
      closeVideoPlayer();
      searchInput.value = channel;
      showLoading();
      try {
        latestVideos = await getPlayableVideos(channel, 24, channelId);
        latestResults = latestVideos.map(video => ({ kind: "video", video }));
        renderResults(latestResults.slice(0, 12));
        renderShorts(latestVideos.slice(8, 14));
        window.scrollTo({ top: 0, behavior: "smooth" });
      } catch (error) {
        showError(error.message || "Could not load channel videos.");
      }
    }

    closePlayer.addEventListener("click", minimizeVideoPlayer);
    fullClose.addEventListener("click", closeVideoPlayer);
    miniOpen.addEventListener("click", restoreMiniPlayer);
    miniPlayNext.addEventListener("click", playNextSuggested);
    miniClose.addEventListener("click", closeVideoPlayer);
    playNextBtn.addEventListener("click", playNextSuggested);
    loopBtn.addEventListener("click", () => { loopPlaylist = !loopPlaylist; loopBtn.style.color = loopPlaylist ? "#ff0033" : "#fff"; });
    shuffleBtn.addEventListener("click", shufflePlaylist);
    channelBtn.addEventListener("click", () => currentVideo && openChannelVideos(currentVideo.channel, currentVideo.channelId));
    minimizeQueueBtn.addEventListener("click", () => {
      playlistPanel.classList.toggle("minimized");
      const minimized = playlistPanel.classList.contains("minimized");
      minimizeQueueBtn.textContent = minimized ? "⌃ Show queue" : "⌄ Minimize";
    });

    window.addEventListener("scroll", () => {
      const nearBottom = window.innerHeight + window.scrollY >= document.body.offsetHeight - 700;
      if (nearBottom) loadMoreResults();
    });

    chips.forEach(chip => chip.addEventListener("click", () => {
      chips.forEach(c => c.classList.remove("active"));
      chip.classList.add("active");
      searchInput.value = "";
      searchYouTube(chip.dataset.filter);
    }));

    bottomItems.forEach(item => item.addEventListener("click", () => {
      searchInput.value = "";
      if (item.textContent.includes("You")) renderLibrary();
      else searchYouTube(item.dataset.search);
      window.scrollTo({ top: 0, behavior: "smooth" });
    }));

    searchForm.addEventListener("submit", event => {
      event.preventDefault();
      searchYouTube(searchInput.value.trim() || "trending videos");
    });

    searchYouTube();
  </script>
</body>
</html>

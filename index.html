<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NZM TUBE</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; }
    body { background: #0f0f0f; color: #fff; padding-bottom: 76px; }
    button { font: inherit; }.topbar {
  position: sticky; top: 0; z-index: 50;
  background: #0f0f0f; padding: 14px 16px 8px;
  border-bottom: 1px solid #1f1f1f;
}

.top-row { display: flex; align-items: center; justify-content: space-between; gap: 14px; margin-bottom: 14px; }
.brand { display: flex; align-items: center; gap: 8px; font-size: 28px; font-weight: 900; letter-spacing: -1px; }
.logo { width: 44px; height: 30px; border-radius: 9px; background: #ff0033; display: grid; place-items: center; font-size: 15px; }
.top-icons { display: flex; align-items: center; gap: 16px; font-size: 25px; }
.notify { position: relative; }
.notify::after { content: "9+"; position: absolute; right: -9px; top: -8px; background: #ff0033; color: #fff; font-size: 11px; padding: 2px 5px; border-radius: 999px; }

.search-wrap { display: flex; border: 1px solid #303030; border-radius: 999px; overflow: hidden; background: #121212; margin-bottom: 14px; }
.search-wrap input { flex: 1; border: none; outline: none; padding: 12px 16px; background: transparent; color: #fff; font-size: 16px; }
.search-wrap button { width: 62px; border: none; border-left: 1px solid #303030; background: #222; color: #fff; cursor: pointer; font-size: 20px; }

.chips { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; }
.chips::-webkit-scrollbar { display: none; }
.chip { border: none; border-radius: 12px; padding: 12px 18px; background: #272727; color: #fff; cursor: pointer; white-space: nowrap; font-size: 16px; }
.chip.active { background: #fff; color: #111; }
.compass { min-width: 54px; font-size: 22px; }

main { max-width: 820px; margin: 0 auto; }
.feed { padding: 0 0 18px; }
.video-card { cursor: pointer; margin-bottom: 24px; }
.thumbnail { position: relative; aspect-ratio: 16 / 9; overflow: hidden; background: #222; }
.thumbnail img { width: 100%; height: 100%; object-fit: cover; display: block; }
.duration, .mix-badge { position: absolute; right: 8px; bottom: 8px; padding: 5px 8px; border-radius: 6px; background: rgba(0,0,0,.78); color: #fff; font-size: 13px; }
.mix-badge { display: flex; align-items: center; gap: 5px; }
.video-info { display: grid; grid-template-columns: 46px 1fr 28px; gap: 12px; padding: 10px 14px 0; }
.avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #333, #555); display: grid; place-items: center; font-weight: 800; font-size: 13px; }
.video-title { font-size: 18px; line-height: 1.35; margin-bottom: 5px; font-weight: 650; }
.meta { color: #aaa; font-size: 14px; line-height: 1.45; }
.dots { font-size: 26px; line-height: 1; color: #ddd; }
.channel-link:hover { color: #fff; text-decoration: underline; }

.summary-card { margin: 12px 22px 0; padding: 12px 16px; border-radius: 12px; background: #063d12; color: #fff; display: flex; justify-content: space-between; align-items: center; font-weight: 700; }

.shorts-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 22px; font-size: 26px; font-weight: 900; }
.shorts-logo { color: #ff0033; margin-right: 10px; }
.shorts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; padding: 0 14px 24px; }
.short-card { position: relative; min-height: 280px; border-radius: 14px; overflow: hidden; background: #222; cursor: pointer; }
.short-card img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
.short-card::after { content: ""; position: absolute; inset: 0; background: linear-gradient(transparent 45%, rgba(0,0,0,.72)); }
.short-title { position: absolute; z-index: 1; left: 10px; right: 10px; bottom: 12px; font-weight: 700; line-height: 1.25; }
.new-badge { position: absolute; z-index: 2; top: 10px; left: 10px; background: #fff; color: #111; padding: 5px 9px; border-radius: 7px; font-weight: 700; }

.empty { display: none; color: #aaa; padding: 32px 0; text-align: center; }

.bottom-nav {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 60;
  height: 72px; background: #0f0f0f; border-top: 1px solid #272727;
  display: grid; grid-template-columns: repeat(5, 1fr); align-items: center;
}
.bottom-item { text-align: center; color: #eee; font-size: 12px; cursor: pointer; }
.bottom-icon { display: block; font-size: 27px; margin-bottom: 3px; }
.plus { width: 52px; height: 52px; border-radius: 50%; background: #272727; margin: 0 auto 2px; display: grid; place-items: center; font-size: 34px; }

.player-modal { position: fixed; inset: 0; z-index: 999; display: none; background: #0f0f0f; overflow-y: auto; }
.watch-player { position: sticky; top: 0; z-index: 2; background: #000; }
.player-frame { width: 100%; aspect-ratio: 16 / 9; border: 0; display: block; background: #000; }
.player-toolbar { position: absolute; top: 10px; left: 12px; right: 12px; display: flex; justify-content: space-between; pointer-events: none; }
.close-player { pointer-events: auto; width: 38px; height: 38px; border: none; border-radius: 50%; background: rgba(0,0,0,.45); color: #fff; font-size: 26px; cursor: pointer; }
.watch-details { padding: 14px 16px; border-bottom: 1px solid #272727; }
.watch-title { font-size: 20px; line-height: 1.35; margin-bottom: 8px; }
.watch-actions { display: flex; gap: 12px; overflow-x: auto; padding-top: 12px; }
.action-btn { border: none; border-radius: 999px; padding: 10px 15px; background: #272727; color: #fff; white-space: nowrap; cursor: pointer; }
.playlist-panel { padding: 14px 16px; border-bottom: 1px solid #272727; background: #151515; }
.playlist-title { font-size: 18px; margin-bottom: 4px; }
.playlist-sub { color: #aaa; font-size: 14px; margin-bottom: 12px; }
.suggested-grid { display: grid; gap: 0; }
.suggested-grid .video-card { margin-bottom: 18px; }

@media (min-width: 821px) {
  body { padding-bottom: 0; }
  .bottom-nav { display: none; }
  .topbar { padding-left: 24px; padding-right: 24px; }
  .thumbnail { border-radius: 0; }
  .shorts-grid { grid-template-columns: repeat(4, 1fr); }
}

  </style>
</head>
<body>
  <header class="topbar">
    <div class="top-row">
      <div class="brand"><div class="logo">▶</div><span>NZM TUBE</span></div>
      <div class="top-icons"><span class="notify">🔔</span><span>🔎</span><span class="avatar" style="width:34px;height:34px;">N</span></div>
    </div>
    <form class="search-wrap" id="searchForm">
      <input id="searchInput" type="search" placeholder="Search NZM TUBE" autocomplete="off" />
      <button type="submit">⌕</button>
    </form>
    <section class="chips">
      <button class="chip compass" data-filter="trending videos">◉</button>
      <button class="chip active" data-filter="trending videos">All</button>
      <button class="chip" data-filter="music playlist">Music</button>
      <button class="chip" data-filter="youtube mix songs playlist">Mixes</button>
      <button class="chip" data-filter="Justin Bieber songs">Justin Bieber</button>
      <button class="chip" data-filter="Philippines news">Philippines</button>
      <button class="chip" data-filter="gaming videos">Gaming</button>
      <button class="chip" data-filter="technology videos">Tech</button>
    </section>
  </header>  <div class="player-modal" id="playerModal">
    <div class="watch-player">
      <iframe class="player-frame" id="playerFrame" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
      <div class="player-toolbar"><button class="close-player" id="closePlayer">⌄</button><button class="close-player" id="fullClose">×</button></div>
    </div>
    <div class="watch-details">
      <h1 class="watch-title" id="watchTitle">Now Playing</h1>
      <p class="meta" id="watchMeta">NZM TUBE</p>
      <div class="watch-actions">
        <button class="action-btn">👍 Like</button>
        <button class="action-btn">👎 Dislike</button>
        <button class="action-btn">↗ Share</button>
        <button class="action-btn" id="channelBtn">📺 Channel</button>
        <button class="action-btn" id="playNextBtn">▶ Play next</button>
      </div>
    </div>
    <div class="playlist-panel">
      <h2 class="playlist-title" id="playlistTitle">Mix playlist</h2>
      <p class="playlist-sub">Suggested videos from your current NZM TUBE search</p>
    </div>
    <div class="suggested-grid" id="suggestedGrid"></div>
  </div>  <main>
    <section class="feed" id="videoGrid"></section>
    <p class="empty" id="emptyState">No videos found. Try another search.</p><section id="shortsSection">
  <div class="shorts-header"><span><span class="shorts-logo">▶</span>Shorts</span><span class="dots">⋮</span></div>
  <div class="shorts-grid" id="shortsGrid"></div>
</section>

  </main>  <nav class="bottom-nav">
    <div class="bottom-item" data-search="trending videos"><span class="bottom-icon">⌂</span>Home</div>
    <div class="bottom-item" data-search="shorts viral videos"><span class="bottom-icon">▶</span>Shorts</div>
    <div class="bottom-item"><span class="plus">＋</span></div>
    <div class="bottom-item" data-search="subscriptions videos"><span class="bottom-icon">▣</span>Subscriptions</div>
    <div class="bottom-item" data-search="music playlist"><span class="bottom-icon">●</span>You</div>
  </nav>  <script>
    const API_KEY = "AIzaSyDZ_1Vx2llR5p-NWgvMTUEXKeZlPmKoU7A";

    const videoGrid = document.getElementById("videoGrid");
    const shortsGrid = document.getElementById("shortsGrid");
    const emptyState = document.getElementById("emptyState");
    const searchForm = document.getElementById("searchForm");
    const searchInput = document.getElementById("searchInput");
    const chips = document.querySelectorAll(".chip");
    const bottomItems = document.querySelectorAll(".bottom-item[data-search]");
    const playerModal = document.getElementById("playerModal");
    const playerFrame = document.getElementById("playerFrame");
    const closePlayer = document.getElementById("closePlayer");
    const fullClose = document.getElementById("fullClose");
    const watchTitle = document.getElementById("watchTitle");
    const watchMeta = document.getElementById("watchMeta");
    const suggestedGrid = document.getElementById("suggestedGrid");
    const playNextBtn = document.getElementById("playNextBtn");
    const channelBtn = document.getElementById("channelBtn");
    const playlistTitle = document.getElementById("playlistTitle");

    let latestVideos = [];
    let currentVideo = null;
    let currentSearch = "trending videos";

    function escapeHTML(text = "") {
      return String(text).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");
    }

    function showLoading() {
      videoGrid.innerHTML = `<p class="meta" style="text-align:center;padding:40px;">Loading videos...</p>`;
      emptyState.style.display = "none";
    }

    function showError(message) {
      videoGrid.innerHTML = "";
      emptyState.textContent = message;
      emptyState.style.display = "block";
    }

    async function getPlayableVideos(query, max = 24, channelId = "") {
      const searchUrl = new URL("https://www.googleapis.com/youtube/v3/search");
      searchUrl.searchParams.set("part", "snippet");
      searchUrl.searchParams.set("type", "video");
      searchUrl.searchParams.set("videoEmbeddable", "true");
      searchUrl.searchParams.set("maxResults", String(max));
      searchUrl.searchParams.set("key", API_KEY);
      if (channelId) searchUrl.searchParams.set("channelId", channelId);
      else searchUrl.searchParams.set("q", query);

      const searchResponse = await fetch(searchUrl);
      const searchData = await searchResponse.json();
      if (!searchResponse.ok) throw new Error(searchData.error?.message || "YouTube API request failed.");

      const ids = (searchData.items || []).map(v => v.id?.videoId).filter(Boolean).join(",");
      if (!ids) return [];

      const detailsUrl = new URL("https://www.googleapis.com/youtube/v3/videos");
      detailsUrl.searchParams.set("part", "snippet,statistics,status,contentDetails");
      detailsUrl.searchParams.set("id", ids);
      detailsUrl.searchParams.set("key", API_KEY);

      const detailsResponse = await fetch(detailsUrl);
      const detailsData = await detailsResponse.json();
      if (!detailsResponse.ok) throw new Error(detailsData.error?.message || "Video details request failed.");

      return (detailsData.items || []).filter(v => v.status?.embeddable === true);
    }

    async function searchYouTube(query = currentSearch) {
      currentSearch = query;
      if (!API_KEY || API_KEY === "YOUR_YOUTUBE_API_KEY_HERE") {
        showError("Add your YouTube API key inside the script first.");
        return;
      }
      showLoading();
      try {
        latestVideos = await getPlayableVideos(query, 24);
        renderVideos(latestVideos.slice(0, 12));
        renderShorts(latestVideos.slice(12, 18));
      } catch (error) {
        showError(error.message || "Something went wrong while loading videos.");
      }
    }

    function compactViews(num) {
      if (!num) return "";
      const n = Number(num);
      if (n >= 1000000) return `${(n / 1000000).toFixed(1)}M views`;
      if (n >= 1000) return `${Math.round(n / 1000)}K views`;
      return `${n} views`;
    }

    function videoCardHTML(video, compact = false) {
      const videoId = video.id;
      const title = escapeHTML(video.snippet.title);
      const channel = escapeHTML(video.snippet.channelTitle);
      const channelId = video.snippet.channelId || "";
      const thumb = video.snippet.thumbnails.high?.url || video.snippet.thumbnails.medium?.url || video.snippet.thumbnails.default?.url;
      const date = new Date(video.snippet.publishedAt).toLocaleDateString();
      const avatar = channel.slice(0, 2).toUpperCase();
      const views = compactViews(video.statistics?.viewCount);
      const isMix = /mix|playlist|songs|music/i.test(title + " " + currentSearch);

      return `
        <article class="video-card" onclick="openPlayer('${videoId}', '${title}', '${channel}', '${channelId}')">
          <div class="thumbnail">
            <img src="${thumb}" alt="${title}" />
            <span class="${isMix ? "mix-badge" : "duration"}">${isMix ? "◉ Mix" : "Play"}</span>
          </div>
          <div class="video-info">
            <div class="avatar channel-link" onclick="event.stopPropagation(); openChannelVideos('${channel}', '${channelId}')">${avatar}</div>
            <div>
              <h3 class="video-title">${title}</h3>
              <p class="meta channel-link" onclick="event.stopPropagation(); openChannelVideos('${channel}', '${channelId}')">${channel}${views ? " · " + views : ""} · ${date}</p>
            </div>
            <div class="dots">⋮</div>
          </div>
          ${isMix && !compact ? `<div class="summary-card"><span>✦ Summary</span><span>⌄</span></div>` : ""}
        </article>`;
    }

    function renderVideos(videos) {
      if (!videos.length) {
        videoGrid.innerHTML = "";
        emptyState.textContent = "No playable videos found. Try another search.";
        emptyState.style.display = "block";
        return;
      }
      emptyState.style.display = "none";
      videoGrid.innerHTML = videos.map(v => videoCardHTML(v)).join("");
    }

    function renderShorts(videos) {
      const shorts = videos.length ? videos : latestVideos.slice(0, 4);
      shortsGrid.innerHTML = shorts.slice(0, 4).map((video, index) => {
        const title = escapeHTML(video.snippet.title);
        const thumb = video.snippet.thumbnails.high?.url || video.snippet.thumbnails.medium?.url || video.snippet.thumbnails.default?.url;
        return `<article class="short-card" onclick="openPlayer('${video.id}', '${title}', '${escapeHTML(video.snippet.channelTitle)}', '${video.snippet.channelId || ""}')">
          ${index % 2 === 0 ? `<span class="new-badge">New</span>` : ""}
          <img src="${thumb}" alt="${title}" />
          <div class="short-title">${title}</div>
        </article>`;
      }).join("");
    }

    function openPlayer(videoId, title, channel, channelId) {
      currentVideo = { videoId, title, channel, channelId };
      watchTitle.textContent = title;
      watchMeta.textContent = `${channel} · NZM TUBE Mix`;
      playlistTitle.textContent = /mix|playlist|songs|music/i.test(title + currentSearch) ? title : "Suggested videos";
      playerFrame.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
      playerModal.style.display = "block";
      document.body.style.overflow = "hidden";
      renderSuggested(videoId);
    }

    function closeVideoPlayer() {
      playerFrame.src = "";
      playerModal.style.display = "none";
      document.body.style.overflow = "";
    }

    function renderSuggested(currentVideoId) {
      const suggestions = latestVideos.filter(v => v.id !== currentVideoId).slice(0, 10);
      suggestedGrid.innerHTML = suggestions.map(v => videoCardHTML(v, true)).join("");
    }

    function playNextSuggested() {
      const next = latestVideos.find(v => v.id !== currentVideo?.videoId);
      if (next) openPlayer(next.id, next.snippet.title, next.snippet.channelTitle, next.snippet.channelId || "");
    }

    async function openChannelVideos(channel, channelId) {
      closeVideoPlayer();
      searchInput.value = channel;
      showLoading();
      try {
        latestVideos = await getPlayableVideos(channel, 24, channelId);
        renderVideos(latestVideos.slice(0, 12));
        renderShorts(latestVideos.slice(12, 18));
        window.scrollTo({ top: 0, behavior: "smooth" });
      } catch (error) {
        showError(error.message || "Could not load channel videos.");
      }
    }

    closePlayer.addEventListener("click", closeVideoPlayer);
    fullClose.addEventListener("click", closeVideoPlayer);
    playNextBtn.addEventListener("click", playNextSuggested);
    channelBtn.addEventListener("click", () => currentVideo && openChannelVideos(currentVideo.channel, currentVideo.channelId));

    chips.forEach(chip => chip.addEventListener("click", () => {
      chips.forEach(c => c.classList.remove("active"));
      chip.classList.add("active");
      searchInput.value = "";
      searchYouTube(chip.dataset.filter);
    }));

    bottomItems.forEach(item => item.addEventListener("click", () => {
      searchInput.value = "";
      searchYouTube(item.dataset.search);
      window.scrollTo({ top: 0, behavior: "smooth" });
    }));

    searchForm.addEventListener("submit", event => {
      event.preventDefault();
      searchYouTube(searchInput.value.trim() || "trending videos");
    });

    searchYouTube();
  </script></body>
</html>
